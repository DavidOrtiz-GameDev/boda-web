<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="main.css">
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Caveat&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Parisienne&display=swap" rel="stylesheet">
  <title>Boda Iván & David</title>
</head>
<body>
  <div class="preloader">
    <div class="container">
      <div class="load">
        <hr/><hr/><hr/><hr/>
      </div>
    </div>
  </div>
  
  <div class="content">
    <div class="folder closed">
      <div class="left">
        <div class="song-form">
          <h4 style="color: #888;">¿Quieres que suene alguna canción especial el día de la celebración?</h4>
          <h4 style="color: #888;">¡Mándanos las canciones que quieras y se las pasaremos a la DJ!</h4>
          <label style="color: #888; font-weight: bold;">Canción</label>
          <input type="text" id="songName" placeholder="Nombre de la canción">
          <label style="color: #888; font-weight: bold;">Artista</label>
          <input type="text" id="songArtist" placeholder="Artista o grupo">
          <button id="sendSong">Enviar canción</button>
        </div>
      </div>
      <div class="right">
        <div class="right-front"></div>
        <div class="right-back">
          <img src="" alt="" style="opacity:0; pointer-events:none;">
          <div class="cover"></div>
        </div>
      </div>
      <button id="openEnvelope">Abrir</button>
    </div>
    <div class="center outside">
        <p class="guest"></p>
        <div class="paper-one" style="background-color: white; box-shadow: 0px 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;">
          <h2 style="color: #555; font-family: 'Georgia', serif;">¡Nos casamos!</h2>
          <p style="color: #777; font-size: 1.2em;">Iván & David</p>
          <hr style="width: 50%; border: 0; border-top: 1px solid #eee; margin: 20px 0;">
          <p style="color: #888;">Estamos muy felices de invitaros a nuestro gran día.</p>
          <p style="font-weight: bold; color: #444;">10 de Octubre de 2026</p>
          <button id="btnSi" onclick="intentarAsistencia('SI')">Asistiré</button>
          <button id="btnNo" onclick="intentarAsistencia('NO')">No podré asistir</button>
        </div>
      </div>
    <footer>
      <div id="countdown" class="countdown">
        <span id="cd-days">00</span>d
        <span id="cd-hours">00</span>h
        <span id="cd-mins">00</span>m
        <span id="cd-secs">00</span>s
      </div>
      <!-- <p><a href="https://bit.ly/bodaNyH2" target="_blank">https://bit.ly/bodaNyH2</a></p> -->
    </footer>
  </div>
  <div id="popup" class="popup hidden">
    <div class="popup-content" id="popup-content"></div>
  </div>
  <div id="nav-left" class="nav-arrow hidden">←</div>
  <div id="nav-right" class="nav-arrow hidden">→</div>
  <script src="main.js"></script>
</body>
</html>
